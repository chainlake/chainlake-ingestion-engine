apiVersion: v1
kind: ConfigMap
metadata:
  name: bsc-block-config-aiven
  namespace: ingestion
data:
  pipeline.yaml: |
    logLevel: info

    pipeline:
      name: "bsc_mainnet_ingestion"
      mode: "realtime"

    chain:
      uid: "evm:56"
      type: "evm"
      name: bsc
      network: "mainnet"

    entities:
      - "block"

    erpc:
      project_id: main
      base_url: http://erpc-service.erpc.svc:4000 # endpoint: "http://erpc-service.erpc.svc:4000/main/evm/56"
      timeout_sec: 10
      max_retries: 1
      inflight:
        min_inflight: 5
        max_inflight: 10
        initial_inflight: 5
        latency_target_ms: 1000

    tracker:
      # polling interval is based on the specific Chain
      poll_interval: 0.4

    engine:
      # concurrency for parallel processing and sink
      # Rule: Engine ≥ RPC inflight
      # set to 1 for sequntial processing
      concurrency: 10

    kafka:
      profile: aiven   # local | k8s | aiven | msk | confluent
      common:
        bootstrap_servers: "redpanda.compute.svc:9092"
        topic_template: "{type}.{chain}.{network}.{kind}_{entity}"
      producer:
        linger_ms: 10
        batch_size: 65536
      streaming:
        batch_size: 100          # micro-batch size
        flush_interval_ms: 20    # max wait time
        queue_maxsize: 100       # backpressure control


    telemetry:
      tracing:
        enabled: false
        endpoint: "http://otel-collector.observability.svc:4317"
        sampleRate: 0.5 # Sample 10% of requests, lower sample rate will impact the Linked Span between kafka.batch_send and streaming.run

      metrics:
        enabled: false
        endpoint: "http://otel-collector.observability.svc:4317"
        export_interval_ms: 5000