apiVersion: v1
kind: ConfigMap
metadata:
  name: bsc-realtime-ingestion
  namespace: ingestion
data:
  pipeline.yaml: |
    logLevel: info

    pipeline:
      mode: "realtime"

    chain:
      name: bsc
      network: "mainnet"

    entities:
      - "receipt"
      - "log"
      - "block"
      - "transaction"

    erpc:
      project_id: main
      base_url: http://erpc-service.erpc.svc:4000 # endpoint: "http://erpc-service.erpc.svc:4000/main/evm/56"
      timeout_sec: 10
      max_retries: 1
      inflight:
        min_inflight: 1
        max_inflight: 10
        initial_inflight: 5
        latency_target_ms: 1000

    tracker:
      # ratio of the chain block interval used to poll head updates
      poll_interval: 0.5

    engine:
      # concurrency for parallel processing and sink
      # Rule: Engine ≥ RPC inflight
      # set to 1 for sequntial processing
      concurrency: 10

    kafka:
      connection:
        bootstrap_servers: "localhost:30092"
      common:
        topic_template: "{type}.{chain}.{network}.{kind}_{entity}"
      producer:
        linger_ms: 50
        batch_size: 65536
        compression_type: zstd   # lz4 for realtime ingestion, zstd for backfill；zstd have higher compression rate
      streaming:
        batch_size: 100          # micro-batch size
        flush_interval_ms: 50    # max wait time
        queue_maxsize: 100       # backpressure control
      protobuf:
        enabled: true

    telemetry:
      tracing:
        enabled: true
        endpoint: "http://otel-collector.observability.svc:4317"
        sampleRate: 1.0 # Sample 10% of requests, lower sample rate will impact the Linked Span between kafka.batch_send and streaming.run

      metrics:
        enabled: true
        endpoint: "http://otel-collector.observability.svc:4317"
        export_interval_ms: 5000
