apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsc-ingestion-block
  namespace: ingestion
  labels:
    chain: bsc
    pipeline: block
  annotations:
    reloader.stakater.com/auto: "true"
    
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      chain: bsc
      pipeline: block
  template:
    metadata:
      labels:
        chain: bsc
        pipeline: block
    spec:
      restartPolicy: Always
      terminationGracePeriodSeconds: 1
      containers:
        - name: ingestion-pipeline
          image: ghcr.io/chainlake/rpcstream:v0.1.6
          imagePullPolicy: IfNotPresent
          command: ["python", "block_pipeline_realtime.py"]

          # -----------------------------
          # Ingest runtime variables
          # -----------------------------
          env:
                         
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid

            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # -----------------------------
          # Metrics endpoint
          # -----------------------------

          # -----------------------------
          # (Optional but recommended)
          # Resource limits
          # -----------------------------
          resources:
            requests:
              cpu: "200m"
              memory: "64Mi"
            limits:
              cpu: "400m"
              memory: "128Mi"