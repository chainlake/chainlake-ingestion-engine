logLevel: info

pipeline:
  mode: "realtime"
  start_block: "latest"
  checkpoint:
    enabled: true

chain:
  name: "bsc"
  network: "mainnet"

# trace is currently not supported
entities:
  # - "receipt"
  # - "log"
  - "block"
  # - "transaction"

erpc:
  project_id: main
  base_url: http://localhost:30040 # endpoint: "http://erpc-service.erpc.svc:4000/main/evm/56"
  timeout_sec: 10
  max_retries: 1
  inflight:
    min_inflight: 1
    max_inflight: 10
    initial_inflight: 5
    latency_target_ms: 1000

tracker:
  # ratio of the chain block interval used to poll head updates
  poll_interval: 0.5 # default is 50% of interval_seconds from chain_profiels.yaml

engine:
  # concurrency for parallel processing and sink
  # Rule: Engine ≥ RPC inflight
  # set to 1 for sequntial processing
  concurrency: 10

kafka:
  # ── Connection examples ─────────────────────────────────────────────────────
  #
  # 1. PLAINTEXT — no auth, no TLS (local dev / internal trusted network)
  #
  # connection:
  #   bootstrap_servers: "localhost:9092"
  #
  # ───────────────────────────────────────────────────────────────────────────
  # 2. SASL_PLAINTEXT — SASL auth over plaintext (internal network with auth)
  #
  # connection:
  #   bootstrap_servers: "localhost:9092"
  #   security_protocol: SASL_PLAINTEXT
  #   sasl_mechanism: PLAIN          # or SCRAM-SHA-256 / SCRAM-SHA-512
  #   auth:
  #     username_env: KAFKA_USERNAME
  #     password_env: KAFKA_PASSWORD
  #
  # ───────────────────────────────────────────────────────────────────────────
  # 3. SSL — one-way TLS, no SASL (encrypt traffic, broker-side cert only)
  #
  # connection:
  #   bootstrap_servers: "localhost:9093"
  #   security_protocol: SSL
  #   ssl:
  #     ca_path_env: KAFKA_CA_PATH   # CA cert to verify the broker
  #
  # ───────────────────────────────────────────────────────────────────────────
  # 4. SASL_SSL — SASL auth over TLS (production default, e.g. Confluent Cloud)
  #
  connection:
    bootstrap_servers: "localhost:30092"
    security_protocol: SASL_SSL
    sasl_mechanism: PLAIN            # or SCRAM-SHA-256 / SCRAM-SHA-512
    auth:
      username_env: KAFKA_USERNAME
      password_env: KAFKA_PASSWORD
    ssl:
      ca_path_env: KAFKA_CA_PATH     # omit if broker cert is signed by a public CA
  # ────────────────────────────────────────────────────────────────────────────
  common:
    topic_template: "{type}.{chain}.{network}.{kind}_{entity}"
  producer:
    linger_ms: 50
    batch_size: 65536
    compression_type: zstd   # lz4 for realtime ingestion, zstd for backfill；zstd have higher compression rate
  streaming:
    batch_size: 100          # micro-batch size
    flush_interval_ms: 50    # max wait time
    queue_maxsize: 100       # backpressure control
  protobuf:
    enabled: true
  eos:
    enabled: false
    transactional_id_template: "{pipeline}.{chain_uid}.{mode}.{entities}"
    init_timeout_sec: 30
    transaction_timeout_ms: 60000

telemetry:
  tracing:
    enabled: false
    endpoint: "http://localhost:4317" # http://otel-collector.observability.svc:4317
    sampleRate: 0.1 # Sample 10% of requests

  metrics:
    enabled: false
    endpoint: "http://localhost:4317"
    export_interval_ms: 5000
