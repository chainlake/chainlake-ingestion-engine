syntax = "proto3";

package evm;

message Block {
  // --- identity ---
  uint64 number = 1;
  string hash = 2;
  string parent_hash = 3;

  // --- PoW legacy ---
  uint64 nonce = 4;
  string sha3_uncles = 5;

  // --- trie roots ---
  string logs_bloom = 6;
  string transactions_root = 7;
  string state_root = 8;
  string receipts_root = 9;

  // --- producer ---
  string miner = 10;

  // --- difficulty ---
  string difficulty = 11;
  string total_difficulty = 12;

  // --- size ---
  uint64 size = 13;

  // --- extra ---
  bytes extra_data = 14;

  // --- gas ---
  uint64 gas_limit = 15;
  uint64 gas_used = 16;
  uint64 timestamp = 17;

  // --- stats ---
  uint32 transaction_count = 18;

  // --- EIP-1559 ---
  string base_fee_per_gas = 19;

  // --- withdrawals ---
  string withdrawals_root = 20;

  // --- EIP-4844 ---
  string blob_gas_used = 21;
  string excess_blob_gas = 22;
}