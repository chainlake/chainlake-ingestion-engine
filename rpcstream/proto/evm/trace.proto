syntax = "proto3";

package evm;

message Trace {
  uint64 block_number = 1;

  string transaction_hash = 2;
  uint32 transaction_index = 3;

  string from_address = 4;
  string to_address = 5;

  string value = 6;

  bytes input = 7;
  bytes output = 8;

  string trace_type = 9;
  string call_type = 10;
  string reward_type = 11;

  uint64 gas = 12;
  uint64 gas_used = 13;

  uint32 subtraces = 14;
  repeated uint32 trace_address = 15;

  string error = 16;
  string status = 17;

  string trace_id = 18;
}