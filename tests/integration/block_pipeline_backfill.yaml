pipeline:
  type: "block"
  mode: "backfill"

adapter:
  type: "evm"
  chain: "bsc"
  network: "mainnet"

schema:
  entities: ["blocks", "transactions"]

range:
  start_block: 90000091
  end_block: 90000100

rpc:
  endpoint: "http://localhost:30040/main/evm/56"
  inflight:
    initial: 10
    max: 20
    timeout_sec: 5

engine:
  concurrency: 20 # concurrency for parallel processing and sink

kafka:
  broker: "localhost:30092"
  producer:
    linger_ms: 5
    batch_size: 65536

log:
  name: "bsc_block_ingestion"
  level: "info"