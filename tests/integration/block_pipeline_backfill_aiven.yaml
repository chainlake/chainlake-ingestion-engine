pipeline:
  type: "block"
  mode: "backfill"

adapter:
  type: "evm"
  chain: "bsc"
  network: "mainnet"

schema:
  entities: ["blocks", "transactions"]

range:
  start_block: 90000001
  end_block: 90000100

rpc:
  endpoint: "http://localhost:30040/main/evm/56"
  timeout_sec: 10
  inflight:
    initial: 10
    max: 20
    target: 10000

engine:
  concurrency: 20 # concurrency for parallel processing and sink

kafka:
  bootstrap_servers: "kafka-default-datakube.l.aivencloud.com:22782"

  security:
    protocol: "SASL_SSL"
    mechanism: "PLAIN"

  auth:
    username_env: "KAFKA_USERNAME"
    password_env: "KAFKA_PASSWORD"

  producer:
    linger_ms: 10
    batch_size: 65536

  streaming:
    batch_size: 100          # micro-batch size
    flush_interval_ms: 20    # max wait time
    queue_maxsize: 1000      # backpressure control


log:
  level: "info"